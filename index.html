<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資配息組合精算工具 - 雲端連動版</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: #f4f7f6; 
            padding: 12px; 
            margin: 0;
            display: flex; 
            justify-content: center; 
        }
        .card { 
            background: white; 
            padding: 20px 16px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            max-width: 500px; 
            width: 100%; 
        }
        h2 { 
            margin-top: 0; 
            color: #1a365d; 
            text-align: center; 
            font-size: 20px; 
            margin-bottom: 5px; 
        }
        .update-status {
            text-align: center;
            font-size: 11px;
            color: #718096;
            margin-bottom: 18px;
            border-bottom: 2px solid #e2e8f0; 
            padding-bottom: 12px;
        }
        .update-status.success { color: #38a169; }
        .update-status.error { color: #e53e3e; }
        
        .input-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a5568; font-size: 13px; }
        input { 
            width: 100%; padding: 12px 10px; border: 1px solid #cbd5e0; 
            border-radius: 8px; font-size: 16px; background: #fff; transition: all 0.2s;
        }
        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.4); outline: none; }
        
        .section-title { font-size: 14px; color: #1a365d; font-weight: bold; margin-top: 20px; margin-bottom: 10px; display: block; }
        .fund-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .fund-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
        .fund-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #cbd5e0; padding-bottom: 6px; margin-bottom: 8px; gap: 10px; }
        
        .fund-name-wrapper { display: flex; align-items: center; width: 55%; gap: 4px; }
        .fund-name-input { font-weight: bold; color: #2b6cb0; font-size: 15px; border: none; background: transparent; padding: 4px; width: 100%; border-bottom: 1px solid transparent; border-radius: 0; }
        .fund-name-input:focus { border-bottom: 1px solid #3182ce; box-shadow: none; background: #edf2f7; }
        .fund-quick-select { padding: 4px 2px; border-radius: 6px; border: 1px solid #cbd5e0; background: #edf2f7; font-size: 12px; color: #4a5568; cursor: pointer; outline: none; max-width: 65px; }
        
        .fund-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-items: center; }
        .grid-item { display: flex; flex-direction: column; }
        .grid-item label { font-size: 11px; color: #718096; margin-bottom: 3px; font-weight: normal; }
        .pct-input { background: #fffaf0; border-color: #fbd38d; font-weight: bold; color: #dd6b20; text-align: center; }
        .nav-input, .div-input { text-align: center; }
        .fund-footer { display: flex; justify-content: flex-end; font-size: 12px; color: #38a169; font-weight: 500; margin-top: 6px; }

        .warning { color: #e53e3e; font-weight: bold; text-align: center; font-size: 14px; margin-top: 10px; display: none; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #fed7d7; }
        .result-box { background: #f7fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; margin-top: 20px; display: block; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #4a5568; }
        .divider { border-top: 1px solid #e2e8f0; margin: 10px 0; }
        .highlight { font-weight: bold; color: #2b6cb0; }
        
        .final-row { background: #f0fff4; border: 2px solid #c6f6d5; padding: 14px; border-radius: 10px; margin-top: 15px; text-align: center; }
        .final-title { font-weight: bold; color: #276749; font-size: 15px; display: block; margin-bottom: 6px; }
        .highlight-twd-payout { font-weight: bold; color: #38a169; font-size: 28px; display: block; }
        .fund-twd-payout { font-weight: bold; color: #2d3748; font-size: 13px; text-align: right; white-space: nowrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 投資配息組合精算工具</h2>
    <div id="syncStatus" class="update-status">正在與雲端資料庫同步...</div>
    
    <div class="input-row">
        <div class="input-group">
            <label for="amount">1. 總保費 (台幣)</label>
            <input type="number" id="amount" value="1000000" inputmode="numeric" oninput="calculatePortfolio()">
        </div>
    </div>
    
    <div class="input-row">
        <div class="input-group">
            <label for="buyRateInput">2-1. 進場換匯匯率</label>
            <input type="number" id="buyRateInput" value="32.1" step="0.01" inputmode="decimal" onfocus="isUserTypingRate = true;" oninput="isUserTypingRate = true; document.getElementById('payoutRateInput').value = this.value; calculatePortfolio();">
        </div>
        <div class="input-group">
            <label for="payoutRateInput">2-2. 未來配息匯率 (看波動)</label>
            <input type="number" id="payoutRateInput" value="32.1" step="0.01" inputmode="decimal" oninput="calculatePortfolio()">
        </div>
    </div>

    <span class="section-title">3. 設定配置比例與參數（須等於 100%）</span>
    
    <div class="fund-list" id="fundContainer">
        </div>
    
    <div id="pctWarning" class="warning">⚠️ 目前配置總和：<span id="currentTotalPct">100</span>% (必須剛好等於 100% 才能計算)</div>

    <div id="result" class="result-box">
        <div class="result-item"><span>保費適用級距：</span><span id="tier" style="font-weight:600;">-</span></div>
        <div class="result-item"><span>手續費用率：</span><span id="feeRate" style="font-weight:600; color:#e53e3e;">-</span></div>
        <div class="result-item"><span>扣除總保費：</span><span id="totalPremium">-</span></div>
        <div class="divider"></div>
        <div class="result-item"><span>實際投資總淨額 (台幣)：</span><span id="totalNetTwd" class="highlight">-</span></div>
        <div class="result-item"><span>實際投資總淨額 (美元)：</span><span id="totalNetUsd" class="highlight" style="color:#4a5568;">-</span></div>
        <div class="final-row">
            <span class="final-title">💰 投資組合預估總月配息 (台幣)</span>
            <span id="totalTwdPayout" class="highlight-twd-payout">-</span>
        </div>
    </div>
</div>

<script>
let isUserTypingRate = false;
let cloudFundsData = []; 

// 專屬資料庫連結已更新
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTi9DtWnbN_Ob0yPA3jpKHTyJAgbQoXVS9GmnWl_5X6ebLfhxpCUcfOKpTjkxPaA0ZbHf7wB6QN0-e8/pub?output=csv";

async function initializeApp() {
    createFundRows(); 
    await fetchExchangeRate();
    await fetchCloudFunds(); 
    updateDropdowns(); 
    calculatePortfolio();
}

async function fetchCloudFunds() {
    const statusDiv = document.getElementById('syncStatus');
    try {
        const response = await fetch(GOOGLE_SHEET_CSV_URL);
        if (!response.ok) throw new Error('無法讀取試算表');
        const csvText = await response.text();
        
        const rows = csvText.split('\n');
        for (let i = 1; i < rows.length; i++) {
            if (!rows[i].trim()) continue;
            const cols = rows[i].split(','); 
            if (cols.length >= 3) {
                const name = cols[0].replace(/"/g, '').trim();
                const nav = parseFloat(cols[1].trim()) || 0;
                const div = parseFloat(cols[2].trim()) || 0;
                cloudFundsData.push({ name, nav, div });
            }
        }
        
        if (cloudFundsData.length > 0) {
            statusDiv.innerText = "✅ 雲端資料庫同步完成";
            statusDiv.className = "update-status success";
        } else {
            throw new Error('試算表中沒有資料');
        }
    } catch (error) {
        console.error(error);
        statusDiv.innerText = "⚠️ 雲端連線異常，請改用手動輸入或檢查表格內容";
        statusDiv.className = "update-status error";
    }
}

function updateDropdowns() {
    const selects = document.querySelectorAll('.fund-quick-select');
    selects.forEach(select => {
        select.innerHTML = '<option value="">快選</option>';
        cloudFundsData.forEach(fund => {
            const option = document.createElement('option');
            option.value = `${fund.name}|${fund.nav}|${fund.div}`;
            option.text = fund.name.substring(0, 6) + '..'; 
            select.appendChild(option);
        });
    });
}

function applyQuickSelect(selectElement) {
    if (!selectElement.value) return;
    const parts = selectElement.value.split('|');
    const row = selectElement.closest('.fund-row');
    row.querySelector('.fund-name-input').value = parts[0];
    row.querySelector('.nav-input').value = parts[1];
    row.querySelector('.div-input').value = parts[2];
    calculatePortfolio();
    selectElement.value = "";
}

function createFundRows() {
    const container = document.getElementById('fundContainer');
    const labels = ['A', 'B', 'C', 'D', 'E'];
    const defaultPcts = [40, 30, 30, 0, 0];
    
    let html = '';
    for (let i = 0; i < 5; i++) {
        html += `
        <div class="fund-card fund-row">
            <div class="fund-header">
                <div class="fund-name-wrapper">
                    <input type="text" class="fund-name-input" value="基金 ${labels[i]}" placeholder="輸入名稱">
                    <select class="fund-quick-select" onchange="applyQuickSelect(this)">
                        <option value="">快選</option>
                    </select>
                </div>
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item">
                    <label>比例 (%)</label>
                    <input type="number" class="pct-input" value="${defaultPcts[i]}" inputmode="numeric" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>淨值 (USD)</label>
                    <input type="number" class="nav-input" value="10.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>配息 (USD)</label>
                    <input type="number" class="div-input" value="0.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>`;
    }
    container.innerHTML = html;
}

async function fetchExchangeRate() {
    if (isUserTypingRate) return;
    try {
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await response.json();
        if (data && data.rates && data.rates.TWD) {
            const twdRate = Math.round(data.rates.TWD * 100) / 100;
            document.getElementById('buyRateInput').value = twdRate;
            document.getElementById('payoutRateInput').value = twdRate;
        }
    } catch (e) {
        console.error('匯率讀取失敗', e);
    }
}

function calculatePortfolio() {
    const amount = parseFloat(document.getElementById('amount').value);
    const buyRate = parseFloat(document.getElementById('buyRateInput').value);
    const payoutRate = parseFloat(document.getElementById('payoutRateInput').value);
    const warningBox = document.getElementById('pctWarning');
    
    if (isNaN(amount) || amount <= 0 || isNaN(buyRate) || buyRate <= 0 || isNaN(payoutRate) || payoutRate <= 0) return;

    const rows = document.querySelectorAll('.fund-row');
    let totalPct = 0;
    rows.forEach(row => { totalPct += parseFloat(row.querySelector('.pct-input').value) || 0; });
    totalPct = Math.round(totalPct * 100) / 100;
    document.getElementById('currentTotalPct').innerText = totalPct;

    if (totalPct !== 100) {
        warningBox.style.display = 'block';
        ['tier', 'feeRate', 'totalPremium', 'totalNetTwd', 'totalNetUsd', 'totalTwdPayout'].forEach(id => document.getElementById(id).innerText = "-");
        return;
    } else { warningBox.style.display = 'none'; }

    let feeRate = 0; let tierText = "";
    if (amount < 2000000) { feeRate = 0.05; tierText = "200 萬以內(不含)"; }
    else if (amount >= 2000000 && amount < 5000000) { feeRate = 0.04; tierText = "200 萬(含) ~ 未滿 500 萬"; }
    else if (amount >= 5000000 && amount < 10000000) { feeRate = 0.03; tierText = "500 萬(含) ~ 未滿 1,000 萬"; }
    else { feeRate = 0.02; tierText = "1,000 萬(含)以上"; }

    const totalPremium = amount * feeRate;
    const totalNetTwd = amount - totalPremium; 
    const totalNetUsd = totalNetTwd / buyRate; 
    let aggregatedTwdPayout = 0;

    rows.forEach(row => {
        const pct = parseFloat(row.querySelector('.pct-input').value) || 0;
        const nav = parseFloat(row.querySelector('.nav-input').value) || 0;
        const divPerUnit = parseFloat(row.querySelector('.div-input').value) || 0;
        const payoutSpan = row.querySelector('.fund-twd-payout');
        const footerDiv = row.querySelector('.fund-footer');

        const fundPremiumAllocated = totalNetTwd * (pct / 100);
        payoutSpan.innerText = "投入金額：NT$ " + Math.round(fundPremiumAllocated).toLocaleString();

        if (pct === 0 || nav <= 0 || divPerUnit <= 0) { footerDiv.innerText = "預估月配息：NT$ 0"; return; }

        const fundNetUsd = totalNetUsd * (pct / 100);
        const fundTwdPayout = (fundNetUsd / nav) * divPerUnit * payoutRate;
        aggregatedTwdPayout += fundTwdPayout;
        footerDiv.innerText = "預估月配息：NT$ " + Math.round(fundTwdPayout).toLocaleString();
    });

    document.getElementById('tier').innerText = tierText;
    document.getElementById('feeRate').innerText = (feeRate * 100) + "%";
    document.getElementById('totalPremium').innerText = "NT$ " + Math.round(totalPremium).toLocaleString() + " 元";
    document.getElementById('totalNetTwd').innerText = "NT$ " + Math.round(totalNetTwd).toLocaleString() + " 元";
    document.getElementById('totalNetUsd').innerText = "$ " + totalNetUsd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " 美元";
    document.getElementById('totalTwdPayout').innerText = "NT$ " + Math.round(aggregatedTwdPayout).toLocaleString() + " 元";
}

window.addEventListener("load", initializeApp);
</script>

</body>
</html>

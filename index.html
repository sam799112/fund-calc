<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資配息組合精算工具</title>
    <script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "edefb5ffc56240d287ee7cc74a055a64"}'></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: #f4f7f6; 
            padding: 12px; 
            margin: 0;
            display: flex; 
            justify-content: center; 
        }
        .card { 
            background: white; 
            padding: 20px 16px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            max-width: 500px; 
            width: 100%; 
        }
        h2 { 
            margin-top: 0; 
            color: #1a365d; 
            text-align: center; 
            font-size: 20px; 
            margin-bottom: 5px; 
        }
        .cloud-status {
            text-align: center;
            font-size: 11px;
            color: #718096;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }
        .cloud-status.success { color: #38a169; font-weight: bold; }
        .cloud-status.error { color: #e53e3e; font-weight: bold; }

        .input-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 16px; 
        }
        .input-group { 
            flex: 1; 
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: bold; 
            color: #4a5568; 
            font-size: 13px; 
        }
        input { 
            width: 100%; 
            padding: 12px 10px; 
            border: 1px solid #cbd5e0; 
            border-radius: 8px; 
            font-size: 16px; 
            background: #fff;
            transition: all 0.2s;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input:focus { 
            border-color: #3182ce; 
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.4); 
            outline: none; 
            background: #fff;
        }
        
        .section-title {
            font-size: 14px; 
            color: #1a365d; 
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 10px;
            display: block;
        }

        /* 快選面板樣式 */
        .quick-select-panel {
            background: #edf2f7;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .panel-label {
            font-size: 12px;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 6px;
            display: block;
        }
        .panel-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .quick-btn {
            padding: 6px 12px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .quick-btn:hover { background: #2b6cb0; }
        .quick-btn.jpm { background: #805ad5; }
        .quick-btn.jpm:hover { background: #6b46c1; }
        
        .quick-dropdown {
            padding: 5px 8px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 13px;
            color: #4a5568;
            background-color: white;
            cursor: pointer;
            outline: none;
        }

        .fund-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }
        .fund-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
        }
        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #cbd5e0;
            padding-bottom: 6px;
            margin-bottom: 8px;
            gap: 10px;
        }
        
        .fund-name-input {
            font-weight: bold;
            color: #2b6cb0;
            font-size: 15px;
            border: none;
            background: transparent;
            padding: 4px;
            width: 55%;
            border-bottom: 1px solid transparent;
            border-radius: 0;
        }
        .fund-name-input:focus {
            border-bottom: 1px solid #3182ce;
            box-shadow: none;
            background: #edf2f7;
        }
        
        .fund-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            align-items: center;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
        }
        .grid-item label {
            font-size: 11px;
            color: #718096;
            margin-bottom: 3px;
            font-weight: normal;
        }
        .pct-input { background: #fffaf0; border-color: #fbd38d; font-weight: bold; color: #dd6b20; text-align: center; }
        .nav-input, .div-input { text-align: center; }

        .fund-footer {
            display: flex;
            justify-content: flex-end;
            font-size: 12px;
            color: #38a169;
            font-weight: 500;
            margin-top: 6px;
        }

        .warning { 
            color: #e53e3e; 
            font-weight: bold; 
            text-align: center; 
            font-size: 14px; 
            margin-top: 10px; 
            display: none; 
            background: #fff5f5; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #fed7d7; 
        }
        .result-box { 
            background: #f7fafc; 
            border: 1px solid #e2e8f0; 
            padding: 16px; 
            border-radius: 12px; 
            margin-top: 20px; 
            display: block; 
        }
        .result-item { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #4a5568; 
        }
        .divider { border-top: 1px solid #e2e8f0; margin: 10px 0; }
        .highlight { font-weight: bold; color: #2b6cb0; }
        
        .final-row { 
            background: #f0fff4; 
            border: 2px solid #c6f6d5; 
            padding: 14px; 
            border-radius: 10px; 
            margin-top: 15px; 
            text-align: center;
        }
        .final-title {
            font-weight: bold; 
            color: #276749; 
            font-size: 15px;
            display: block;
            margin-bottom: 6px;
        }
        .highlight-twd-payout { 
            font-weight: bold; 
            color: #38a169; 
            font-size: 28px; 
            display: block;
        }
        .fund-twd-payout { font-weight: bold; color: #2d3748; font-size: 13px; text-align: right; white-space: nowrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 投資配息組合精算工具</h2>
    <div id="cloudStatus" class="cloud-status">正在連線雲端資料庫...</div>
    
    <div class="input-row">
        <div class="input-group">
            <label for="amount">1. 總保費 (台幣)</label>
            <input type="number" id="amount" value="1000000" inputmode="numeric" oninput="calculatePortfolio()">
        </div>
    </div>
    
    <div class="input-row">
        <div class="input-group">
            <label for="buyRateInput">2-1. 進場換匯匯率</label>
            <input type="number" id="buyRateInput" value="32.1" step="0.01" inputmode="decimal" onfocus="isUserTypingRate = true;" oninput="isUserTypingRate = true; document.getElementById('payoutRateInput').value = this.value; calculatePortfolio();">
        </div>
        <div class="input-group">
            <label for="payoutRateInput">2-2. 未來配息匯率 (看波動)</label>
            <input type="number" id="payoutRateInput" value="32.1" step="0.01" inputmode="decimal" oninput="calculatePortfolio()">
        </div>
    </div>

    <div class="quick-select-panel">
        <span class="panel-label">✨ 快選基金</span>
        <div class="panel-row">
            <button onclick="insertCloudFund('allianz')" class="quick-btn">DSP5</button>
            <button onclick="insertCloudFund('jpm')" class="quick-btn jpm">JFP11</button>
            <span style="font-size: 12px; color: #4a5568;">➔ 至：</span>
            <select id="targetFundSelect" class="quick-dropdown">
                <option value="0">基金 A</option>
                <option value="1">基金 B</option>
                <option value="2">基金 C</option>
                <option value="3">基金 D</option>
                <option value="4">基金 E</option>
            </select>
        </div>
    </div>

    <span class="section-title">3. 設定配置比例與參數（須等於 100%）</span>
    
    <div class="fund-list">
        <div class="fund-card fund-row">
            <div class="fund-header">
                <input type="text" class="fund-name-input" value="DSP5" placeholder="輸入名稱">
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item">
                    <label>比例 (%)</label>
                    <input type="number" class="pct-input" value="40" inputmode="numeric" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>淨值 (USD)</label>
                    <input type="number" class="nav-input" value="8.7731" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>配息 (USD)</label>
                    <input type="number" class="div-input" value="0.055" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>

        <div class="fund-card fund-row">
            <div class="fund-header">
                <input type="text" class="fund-name-input" value="JFP11" placeholder="輸入名稱">
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item">
                    <label>比例 (%)</label>
                    <input type="number" class="pct-input" value="30" inputmode="numeric" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>淨值 (USD)</label>
                    <input type="number" class="nav-input" value="74.76" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>配息 (USD)</label>
                    <input type="number" class="div-input" value="0.693" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>

        <div class="fund-card fund-row">
            <div class="fund-header">
                <input type="text" class="fund-name-input" value="基金 C" placeholder="輸入名稱">
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item">
                    <label>比例 (%)</label>
                    <input type="number" class="pct-input" value="30" inputmode="numeric" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>淨值 (USD)</label>
                    <input type="number" class="nav-input" value="10.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>配息 (USD)</label>
                    <input type="number" class="div-input" value="0.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>

        <div class="fund-card fund-row">
            <div class="fund-header">
                <input type="text" class="fund-name-input" value="基金 D" placeholder="輸入名稱">
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item">
                    <label>比例 (%)</label>
                    <input type="number" class="pct-input" value="0" inputmode="numeric" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>淨值 (USD)</label>
                    <input type="number" class="nav-input" value="10.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>配息 (USD)</label>
                    <input type="number" class="div-input" value="0.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>

        <div class="fund-card fund-row">
            <div class="fund-header">
                <input type="text" class="fund-name-input" value="基金 E" placeholder="輸入名稱">
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item">
                    <label>比例 (%)</label>
                    <input type="number" class="pct-input" value="0" inputmode="numeric" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>淨值 (USD)</label>
                    <input type="number" class="nav-input" value="10.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
                <div class="grid-item">
                    <label>配息 (USD)</label>
                    <input type="number" class="div-input" value="0.0" step="0.0001" inputmode="decimal" oninput="calculatePortfolio()">
                </div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>
    </div>
    
    <div id="pctWarning" class="warning">⚠️ 目前配置總和：<span id="currentTotalPct">100</span>% (必須剛好等於 100% 才能計算)</div>

    <div id="result" class="result-box">
        <div class="result-item"><span>保費適用級距：</span><span id="tier" style="font-weight:600;">-</span></div>
        <div class="result-item"><span>手續費用率：</span><span id="feeRate" style="font-weight:600; color:#e53e3e;">-</span></div>
        <div class="result-item"><span>扣除總保費：</span><span id="totalPremium">-</span></div>
        
        <div class="divider"></div>
        
        <div class="result-item"><span>實際投資總淨額 (台幣)：</span><span id="totalNetTwd" class="highlight">-</span></div>
        <div class="result-item"><span>實際投資總淨額 (美元)：</span><span id="totalNetUsd" class="highlight" style="color:#4a5568;">-</span></div>
        
        <div class="final-row">
            <span class="final-title">💰 投資組合預估總月配息 (台幣)</span>
            <span id="totalTwdPayout" class="highlight-twd-payout">-</span>
        </div>
    </div>
</div>

<script>
let isUserTypingRate = false;
let cloudData = null; 

async function initializeApp() {
    await fetchExchangeRate();
    await fetchCloudFundsData();
}

async function fetchExchangeRate() {
    if (isUserTypingRate) {
        calculatePortfolio();
        return;
    }
    try {
        const response = await fetch('https://open.er-api.com/v6/latest/USD');
        if (!response.ok) throw new Error('網路回應不成功');
        const data = await response.json();
        
        if (data && data.rates && data.rates.TWD && !isUserTypingRate) {
            const twdRate = Math.round(data.rates.TWD * 100) / 100;
            document.getElementById('buyRateInput').value = twdRate;
            document.getElementById('payoutRateInput').value = twdRate;
        }
    } catch (error) {
        console.error('無法取得即時匯率：', error);
    } finally {
        calculatePortfolio();
    }
}

async function fetchCloudFundsData() {
    const statusDiv = document.getElementById('cloudStatus');
    try {
        const response = await fetch('https://raw.githubusercontent.com/sam799112/fund-calc/main/data.json?t=' + new Date().getTime());
        if (!response.ok) throw new Error('雲端連線失敗');
        cloudData = await response.json();
        
        statusDiv.innerText = `✅ 雲端資料同步成功 (資料日期: ${cloudData.date || '今日'})`;
        statusDiv.className = "cloud-status success";
        
        const rows = document.querySelectorAll('.fund-row');
        rows[0].querySelector('.nav-input').value = cloudData.nav;
        rows[0].querySelector('.div-input').value = cloudData.div;
        rows[1].querySelector('.nav-input').value = cloudData.jpm_nav;
        rows[1].querySelector('.div-input').value = cloudData.jpm_div;
        
        calculatePortfolio();
    } catch (e) {
        console.error(e);
        statusDiv.innerText = "⚠️ 雲端連線失敗，目前使用離線快取數據";
        statusDiv.className = "cloud-status error";
    }
}

function insertCloudFund(type) {
    if (!cloudData) {
        alert("尚未連線到雲端資料庫，請檢查網路！");
        return;
    }
    
    const targetIndex = parseInt(document.getElementById('targetFundSelect').value);
    const rows = document.querySelectorAll('.fund-row');
    const targetRow = rows[targetIndex];
    
    if (type === 'allianz') {
        targetRow.querySelector('.fund-name-input').value = "DSP5";
        targetRow.querySelector('.nav-input').value = cloudData.nav;
        targetRow.querySelector('.div-input').value = cloudData.div;
    } else if (type === 'jpm') {
        targetRow.querySelector('.fund-name-input').value = "JFP11";
        targetRow.querySelector('.nav-input').value = cloudData.jpm_nav;
        targetRow.querySelector('.div-input').value = cloudData.jpm_div;
    }
    
    calculatePortfolio();
}

function calculatePortfolio() {
    const amount = parseFloat(document.getElementById('amount').value);
    const buyRate = parseFloat(document.getElementById('buyRateInput').value);
    const payoutRate = parseFloat(document.getElementById('payoutRateInput').value);
    const warningBox = document.getElementById('pctWarning');
    
    if (isNaN(amount) || amount <= 0 || isNaN(buyRate) || buyRate <= 0 || isNaN(payoutRate) || payoutRate <= 0) {
        return;
    }

    const rows = document.querySelectorAll('.fund-row');
    let totalPct = 0;
    
    rows.forEach(row => {
        const pct = parseFloat(row.querySelector('.pct-input').value) || 0;
        totalPct += pct;
    });

    totalPct = Math.round(totalPct * 100) / 100;
    document.getElementById('currentTotalPct').innerText = totalPct;

    if (totalPct !== 100) {
        warningBox.style.display = 'block';
        document.getElementById('tier').innerText = "-";
        document.getElementById('feeRate').innerText = "-";
        document.getElementById('totalPremium').innerText = "-";
        document.getElementById('totalNetTwd').innerText = "-";
        document.getElementById('totalNetUsd').innerText = "-";
        document.getElementById('totalTwdPayout').innerText = "-";
        return;
    } else {
        warningBox.style.display = 'none';
    }

    let feeRate = 0; let tierText = "";
    if (amount < 2000000) { feeRate = 0.05; tierText = "200 萬以內(不含)"; }
    else if (amount >= 2000000 && amount < 5000000) { feeRate = 0.04; tierText = "200 萬(含) ~ 未滿 500 萬"; }
    else if (amount >= 5000000 && amount < 10000000) { feeRate = 0.03; tierText = "500 萬(含) ~ 未滿 1,000 萬"; }
    else { feeRate = 0.02; tierText = "1,000 萬(含)以上"; }

    const totalPremium = amount * feeRate;
    const totalNetTwd = amount - totalPremium; 
    const totalNetUsd = totalNetTwd / buyRate; 

    let aggregatedTwdPayout = 0;

    rows.forEach(row => {
        const pct = parseFloat(row.querySelector('.pct-input').value) || 0;
        const nav = parseFloat(row.querySelector('.nav-input').value) || 0;
        const divPerUnit = parseFloat(row.querySelector('.div-input').value) || 0;
        const payoutSpan = row.querySelector('.fund-twd-payout');
        const footerDiv = row.querySelector('.fund-footer');

        const fundPremiumAllocated = totalNetTwd * (pct / 100);
        payoutSpan.innerText = "投入金額：NT$ " + Math.round(fundPremiumAllocated).toLocaleString();

        if (pct === 0 || nav <= 0 || divPerUnit < 0) {
            footerDiv.innerText = "預估月配息：NT$ 0";
            return;
        }

        const fundNetUsd = totalNetUsd * (pct / 100);
        const fundUnits = fundNetUsd / nav;
        const fundUsdPayout = fundUnits * divPerUnit;
        
        const fundTwdPayout = fundUsdPayout * payoutRate;

        aggregatedTwdPayout += fundTwdPayout;
        footerDiv.innerText = "預估月配息：NT$ " + Math.round(fundTwdPayout).toLocaleString();
    });

    document.getElementById('tier').innerText = tierText;
    document.getElementById('feeRate').innerText = (feeRate * 100) + "%";
    document.getElementById('totalPremium').innerText = "NT$ " + Math.round(totalPremium).toLocaleString() + " 元";
    document.getElementById('totalNetTwd').innerText = "NT$ " + Math.round(totalNetTwd).toLocaleString() + " 元";
    document.getElementById('totalNetUsd').innerText = "$ " + totalNetUsd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " 美元";
    document.getElementById('totalTwdPayout').innerText = "NT$ " + Math.round(aggregatedTwdPayout).toLocaleString() + " 元";
}

window.addEventListener("load", initializeApp);
</script>

</body>
</html>

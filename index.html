<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資配息組合精算工具</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h2 { text-align: center; color: #1a365d; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .fund-card { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eee; }
        .fund-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .fund-footer { margin-top: 5px; font-weight: bold; color: #38a169; }
        .result-box { background: #e6fffa; padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>投資配息精算工具</h2>
    <div id="cloudStatus" style="text-align:center; font-size:12px; color:gray;">初始化中...</div>
    
    <div class="input-row">
        <div class="input-group">
            <label>總保費 (台幣)</label>
            <input type="number" id="amount" value="1000000" oninput="calculatePortfolio()">
        </div>
    </div>
    <div class="input-row">
        <div class="input-group">
            <label>進場匯率</label>
            <input type="number" id="buyRateInput" value="32.1" oninput="calculatePortfolio()">
        </div>
        <div class="input-group">
            <label>配息匯率</label>
            <input type="number" id="payoutRateInput" value="32.1" oninput="calculatePortfolio()">
        </div>
    </div>

    <div class="fund-list" id="fundListContainer">
        </div>

    <div class="result-box">
        <div id="totalTwdPayout" style="font-size:24px; font-weight:bold; color:green; text-align:center;">NT$ 0</div>
    </div>
</div>

<script>
// 生成 5 個基金欄位
function initUI() {
    const container = document.getElementById('fundListContainer');
    container.innerHTML = '';
    for(let i=0; i<5; i++) {
        container.innerHTML += `
        <div class="fund-card fund-row">
            <input type="text" class="fund-name-input" value="基金 ${String.fromCharCode(65+i)}" style="width:100%; border:none; background:transparent; font-weight:bold;">
            <div class="fund-grid">
                <input type="number" class="pct-input" value="20" placeholder="比例%" oninput="calculatePortfolio()">
                <input type="number" class="nav-input" step="0.0001" placeholder="淨值" oninput="calculatePortfolio()">
                <input type="number" class="div-input" step="0.0001" placeholder="配息" oninput="calculatePortfolio()">
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>`;
    }
}

async function fetchData() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/sam799112/fund-calc/main/data.json?t=" + new Date().getTime());
        const data = await res.json();
        document.getElementById('cloudStatus').innerText = "✅ 資料同步完成";
    } catch(e) {
        document.getElementById('cloudStatus').innerText = "⚠ 雲端資料讀取失敗，請手動輸入";
    }
}

function calculatePortfolio() {
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const buyRate = parseFloat(document.getElementById('buyRateInput').value) || 1;
    const payoutRate = parseFloat(document.getElementById('payoutRateInput').value) || 1;
    const rows = document.querySelectorAll('.fund-row');
    
    let totalPayout = 0;
    rows.forEach(r => {
        const pct = parseFloat(r.querySelector('.pct-input').value) || 0;
        const nav = parseFloat(r.querySelector('.nav-input').value) || 0;
        const div = parseFloat(r.querySelector('.div-input').value) || 0;
        if(pct > 0 && nav > 0) {
            const payout = (amount * (pct/100) / nav / buyRate) * div * payoutRate;
            r.querySelector('.fund-footer').innerText = "預估月配息：NT$ " + Math.round(payout).toLocaleString();
            totalPayout += payout;
        }
    });
    document.getElementById('totalTwdPayout').innerText = "NT$ " + Math.round(totalPayout).toLocaleString() + " 元";
}

initUI();
fetchData();
</script>
</body>
</html>

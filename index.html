<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資配息組合精算工具</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f7f6; padding: 12px; margin: 0; display: flex; justify-content: center; }
        .card { background: white; padding: 20px 16px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); max-width: 500px; width: 100%; }
        h2 { margin-top: 0; color: #1a365d; text-align: center; font-size: 20px; margin-bottom: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
        .input-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a5568; font-size: 13px; }
        input { width: 100%; padding: 12px 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; background: #fff; }
        .pct-input { background: #fffaf0; border-color: #fbd38d; font-weight: bold; color: #dd6b20; text-align: center; }
        .fund-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .fund-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #cbd5e0; padding-bottom: 6px; margin-bottom: 8px; }
        .fund-name-input { font-weight: bold; color: #2b6cb0; border: none; background: transparent; width: 45%; }
        .fund-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .nav-input, .div-input { text-align: center; }
        .fund-footer { display: flex; justify-content: flex-end; font-size: 12px; color: #38a169; font-weight: 500; margin-top: 6px; }
        .result-box { background: #f7fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; margin-top: 20px; }
        .final-row { background: #f0fff4; border: 2px solid #c6f6d5; padding: 14px; border-radius: 10px; margin-top: 15px; text-align: center; }
        .highlight-twd-payout { font-weight: bold; color: #38a169; font-size: 28px; display: block; }
        .warning { color: #e53e3e; font-weight: bold; text-align: center; font-size: 14px; margin-top: 10px; display: none; background: #fff5f5; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 投資配息組合精算工具</h2>
    
    <div style="margin-bottom: 20px; text-align: center;">
        <button onclick="applyAllianz()" style="padding: 10px 20px; background: #3182ce; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
            🚀 一鍵載入：安聯收益成長 (自動更新)
        </button>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>1. 總保費 (台幣)</label>
            <input type="number" id="amount" value="1000000" oninput="calculatePortfolio()">
        </div>
    </div>
    
    <div class="input-row">
        <div class="input-group">
            <label>2-1. 進場匯率</label>
            <input type="number" id="buyRateInput" value="32.1" step="0.01" oninput="calculatePortfolio()">
        </div>
        <div class="input-group">
            <label>2-2. 配息匯率</label>
            <input type="number" id="payoutRateInput" value="32.1" step="0.01" oninput="calculatePortfolio()">
        </div>
    </div>

    <div class="fund-list" id="fundList">
        <div class="fund-card fund-row">
            <div class="fund-header">
                <input type="text" class="fund-name-input" value="基金 A">
                <span class="fund-twd-payout">投入金額：NT$ 0</span>
            </div>
            <div class="fund-grid">
                <div class="grid-item"><label>比例 (%)</label><input type="number" class="pct-input" value="100" oninput="calculatePortfolio()"></div>
                <div class="grid-item"><label>淨值 (USD)</label><input type="number" class="nav-input" step="0.0001" oninput="calculatePortfolio()"></div>
                <div class="grid-item"><label>配息 (USD)</label><input type="number" class="div-input" step="0.0001" oninput="calculatePortfolio()"></div>
            </div>
            <div class="fund-footer">預估月配息：NT$ 0</div>
        </div>
    </div>

    <div id="pctWarning" class="warning">⚠️ 配置比例總和需等於 100%</div>

    <div id="result" class="result-box">
        <div class="final-row">
            <span class="final-title">💰 投資組合預估總月配息</span>
            <span id="totalTwdPayout" class="highlight-twd-payout">-</span>
        </div>
    </div>
</div>

<script>
// 自動載入安聯數據
async function applyAllianz() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/sam799112/fund-calc/main/data.json?t=' + new Date().getTime());
        const data = await response.json();
        const row = document.querySelector('.fund-row');
        row.querySelector('.fund-name-input').value = "安聯收益成長(AM)";
        row.querySelector('.nav-input').value = data.nav;
        row.querySelector('.div-input').value = data.div;
        calculatePortfolio();
    } catch (e) { alert("無法取得最新數據，請稍後再試"); }
}

function calculatePortfolio() {
    const amount = parseFloat(document.getElementById('amount').value);
    const buyRate = parseFloat(document.getElementById('buyRateInput').value);
    const payoutRate = parseFloat(document.getElementById('payoutRateInput').value);
    const rows = document.querySelectorAll('.fund-row');
    
    let totalPct = 0;
    rows.forEach(r => totalPct += parseFloat(r.querySelector('.pct-input').value) || 0);
    document.getElementById('pctWarning').style.display = totalPct === 100 ? 'none' : 'block';

    if (totalPct !== 100) return;

    let feeRate = amount < 2000000 ? 0.05 : 0.02; // 簡化費率邏輯
    const totalNetTwd = amount * (1 - feeRate);
    const totalNetUsd = totalNetTwd / buyRate;
    let totalPayout = 0;

    rows.forEach(row => {
        const pct = parseFloat(row.querySelector('.pct-input').value) / 100;
        const nav = parseFloat(row.querySelector('.nav-input').value);
        const div = parseFloat(row.querySelector('.div-input').value);
        if(nav > 0) {
            const payout = (totalNetUsd * pct / nav) * div * payoutRate;
            totalPayout += payout;
            row.querySelector('.fund-footer').innerText = "預估月配息：NT$ " + Math.round(payout).toLocaleString();
        }
    });
    document.getElementById('totalTwdPayout').innerText = "NT$ " + Math.round(totalPayout).toLocaleString();
}
</script>
</body>
</html>

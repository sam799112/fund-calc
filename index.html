<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>投資配息組合精算工具</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f7f6; padding: 12px; margin: 0; display: flex; justify-content: center; }
        .card { background: white; padding: 20px 16px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); max-width: 500px; width: 100%; }
        h2 { margin-top: 0; color: #1a365d; text-align: center; font-size: 20px; margin-bottom: 5px; }
        .cloud-status { text-align: center; font-size: 11px; color: #718096; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .cloud-status.success { color: #38a169; font-weight: bold; }
        .cloud-status.error { color: #e53e3e; font-weight: bold; }
        .input-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #4a5568; font-size: 13px; }
        input { width: 100%; padding: 12px 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; background: #fff; transition: all 0.2s; }
        input:focus { border-color: #3182ce; box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.4); outline: none; }
        .section-title { font-size: 14px; color: #1a365d; font-weight: bold; margin-top: 15px; margin-bottom: 10px; display: block; }
        .quick-select-panel { background: #edf2f7; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .panel-label { font-size: 12px; font-weight: bold; color: #4a5568; margin-bottom: 6px; display: block; }
        .panel-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .btn-container { display: flex; gap: 6px; flex-wrap: wrap; }
        .quick-btn { padding: 6px 10px; background: #3182ce; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .quick-dropdown { padding: 5px 6px; border-radius: 6px; border: 1px solid #cbd5e0; font-size: 12px; color: #4a5568; background-color: white; cursor: pointer; }
        .fund-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .fund-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
        .fund-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #cbd5e0; padding-bottom: 6px; margin-bottom: 8px; gap: 10px; }
        .fund-name-input { font-weight: bold; color: #2b6cb0; font-size: 15px; border: none; background: transparent; padding: 4px; width: 55%; }
        .fund-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-items: center; }
        .grid-item { display: flex; flex-direction: column; }
        .grid-item label { font-size: 11px; color: #718096; margin-bottom: 3px; }
        .pct-input { background: #fffaf0; border-color: #fbd38d; font-weight: bold; color: #dd6b20; text-align: center; }
        .nav-input, .div-input { text-align: center; }
        .fund-footer { display: flex; justify-content: flex-end; font-size: 12px; color: #38a169; font-weight: 500; margin-top: 6px; }
        .warning { color: #e53e3e; font-weight: bold; text-align: center; font-size: 14px; margin-top: 10px; display: none; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #fed7d7; }
        .result-box { background: #f7fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; margin-top: 20px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #4a5568; }
        .divider { border-top: 1px solid #e2e8f0; margin: 10px 0; }
        .highlight { font-weight: bold; color: #2b6cb0; }
        .final-row { background: #f0fff4; border: 2px solid #c6f6d5; padding: 14px; border-radius: 10px; margin-top: 15px; text-align: center; }
        .final-title { font-weight: bold; color: #276749; font-size: 15px; display: block; margin-bottom: 6px; }
        .highlight-twd-payout { font-weight: bold; color: #38a169; font-size: 28px; display: block; }
        .fund-twd-payout { font-weight: bold; color: #2d3748; font-size: 13px; text-align: right; white-space: nowrap; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 投資配息組合精算工具</h2>
    <div id="cloudStatus" class="cloud-status">準備就緒</div>
    
    <div class="input-row">
        <div class="input-group">
            <label for="amount">1. 總保費 (台幣)</label>
            <input type="number" id="amount" value="1000000" inputmode="numeric" oninput="calculatePortfolio()">
        </div>
    </div>
    
    <div class="input-row">
        <div class="input-group">
            <label>2-1. 進場換匯匯率</label>
            <input type="number" id="buyRateInput" value="32.1" step="0.01" inputmode="decimal" oninput="calculatePortfolio()">
        </div>
        <div class="input-group">
            <label>2-2. 未來配息匯率</label>
            <input type="number" id="payoutRateInput" value="32.1" step="0.01" inputmode="decimal" oninput="calculatePortfolio()">
        </div>
    </div>

    <div class="quick-select-panel">
        <span class="panel-label">✨ 快選基金 (點擊自動填入)</span>
        <div class="panel-row">
            <div id="quickBtnContainer" class="btn-container"></div>
            <span style="font-size: 12px; color: #4a5568; margin-left: 4px;">➔ 至：</span>
            <select id="targetFundSelect" class="quick-dropdown">
                <option value="0">欄位 1</option>
                <option value="1">欄位 2</option>
                <option value="2">欄位 3</option>
                <option value="3">欄位 4</option>
                <option value="4">欄位 5</option>
            </select>
        </div>
    </div>

    <span class="section-title">3. 設定配置比例與參數（須等於 100%）</span>
    <div class="fund-list">
        <div class="fund-card fund-row"><div class="fund-header"><input type="text" class="fund-name-input" value="基金 A"><span class="fund-twd-payout">金額：NT$ 0</span></div><div class="fund-grid"><div class="grid-item"><label>比例%</label><input type="number" class="pct-input" value="0" oninput="calculatePortfolio()"></div><div class="grid-item"><label>淨值</label><input type="number" class="nav-input" step="0.0001" oninput="calculatePortfolio()"></div><div class="grid-item"><label>配息</label><input type="number" class="div-input" step="0.0001" oninput="calculatePortfolio()"></div></div><div class="fund-footer">預估月配息：NT$ 0</div></div>
        <div class="fund-card fund-row"><div class="fund-header"><input type="text" class="fund-name-input" value="基金 B"><span class="fund-twd-payout">金額：NT$ 0</span></div><div class="fund-grid"><div class="grid-item"><label>比例%</label><input type="number" class="pct-input" value="0" oninput="calculatePortfolio()"></div><div class="grid-item"><label>淨值</label><input type="number" class="nav-input" step="0.0001" oninput="calculatePortfolio()"></div><div class="grid-item"><label>配息</label><input type="number" class="div-input" step="0.0001" oninput="calculatePortfolio()"></div></div><div class="fund-footer">預估月配息：NT$ 0</div></div>
        <div class="fund-card fund-row"><div class="fund-header"><input type="text" class="fund-name-input" value="基金 C"><span class="fund-twd-payout">金額：NT$ 0</span></div><div class="fund-grid"><div class="grid-item"><label>比例%</label><input type="number" class="pct-input" value="0" oninput="calculatePortfolio()"></div><div class="grid-item"><label>淨值</label><input type="number" class="nav-input" step="0.0001" oninput="calculatePortfolio()"></div><div class="grid-item"><label>配息</label><input type="number" class="div-input" step="0.0001" oninput="calculatePortfolio()"></div></div><div class="fund-footer">預估月配息：NT$ 0</div></div>
        <div class="fund-card fund-row"><div class="fund-header"><input type="text" class="fund-name-input" value="基金 D"><span class="fund-twd-payout">金額：NT$ 0</span></div><div class="fund-grid"><div class="grid-item"><label>比例%</label><input type="number" class="pct-input" value="0" oninput="calculatePortfolio()"></div><div class="grid-item"><label>淨值</label><input type="number" class="nav-input" step="0.0001" oninput="calculatePortfolio()"></div><div class="grid-item"><label>配息</label><input type="number" class="div-input" step="0.0001" oninput="calculatePortfolio()"></div></div><div class="fund-footer">預估月配息：NT$ 0</div></div>
        <div class="fund-card fund-row"><div class="fund-header"><input type="text" class="fund-name-input" value="基金 E"><span class="fund-twd-payout">金額：NT$ 0</span></div><div class="fund-grid"><div class="grid-item"><label>比例%</label><input type="number" class="pct-input" value="0" oninput="calculatePortfolio()"></div><div class="grid-item"><label>淨值</label><input type="number" class="nav-input" step="0.0001" oninput="calculatePortfolio()"></div><div class="grid-item"><label>配息</label><input type="number" class="div-input" step="0.0001" oninput="calculatePortfolio()"></div></div><div class="fund-footer">預估月配息：NT$ 0</div></div>
    </div>
    
    <div id="pctWarning" class="warning">⚠️ 配置總和必須等於 100%</div>

    <div id="result" class="result-box">
        <div class="result-item"><span>保費適用級距：</span><span id="tier" style="font-weight:600;">-</span></div>
        <div class="result-item"><span>手續費用率：</span><span id="feeRate" style="font-weight:600; color:#e53e3e;">-</span></div>
        <div class="result-item"><span>扣除總保費：</span><span id="totalPremium">-</span></div>
        <div class="divider"></div>
        <div class="result-item"><span>實際投資總淨額 (台幣)：</span><span id="totalNetTwd" class="highlight">-</span></div>
        <div class="result-item"><span>實際投資總淨額 (美元)：</span><span id="totalNetUsd" class="highlight" style="color:#4a5568;">-</span></div>
        <div class="final-row">
            <span class="final-title">💰 投資組合預估總月配息 (台幣)</span>
            <span id="totalTwdPayout" class="highlight-twd-payout">-</span>
        </div>
    </div>
</div>

<script>
let processedFunds = {}; 

async function fetchFubonOfficialData() {
    try {
        const response = await fetch("https://raw.githubusercontent.com/sam799112/fund-calc/main/data.json?t=" + new Date().getTime());
        const rawData = await response.json();
        
        processedFunds = {
            'DSP5': { name: 'DSP5', nav: parseFloat(rawData.nav) || 0, div: parseFloat(rawData.div) || 0 },
            'JFP11': { name: 'JFP11', nav: parseFloat(rawData.jpm_nav) || 0, div: parseFloat(rawData.jpm_div) || 0 },
            'FRP4': { name: 'FRP4', nav: parseFloat(rawData.frp4_nav) || 0, div: parseFloat(rawData.frp4_div) || 0 },
            'MLE24': { name: 'MLE24', nav: parseFloat(rawData.mle24_nav) || 0, div: parseFloat(rawData.mle24_div) || 0 }
        };
        document.getElementById('cloudStatus').innerText = "✅ 雲端資料已載入";
        renderQuickButtons();
    } catch (e) { document.getElementById('cloudStatus').innerText = "資料讀取失敗"; }
}

function renderQuickButtons() {
    const container = document.getElementById('quickBtnContainer');
    container.innerHTML = ''; 
    Object.keys(processedFunds).forEach(code => {
        const btn = document.createElement('button');
        btn.className = 'quick-btn';
        btn.innerText = code;
        btn.onclick = () => {
            const idx = parseInt(document.getElementById('targetFundSelect').value);
            const row = document.querySelectorAll('.fund-row')[idx];
            row.querySelector('.fund-name-input').value = processedFunds[code].name;
            row.querySelector('.nav-input').value = processedFunds[code].nav;
            row.querySelector('.div-input').value = processedFunds[code].div;
            calculatePortfolio();
        };
        container.appendChild(btn);
    });
}

function calculatePortfolio() {
    const amount = parseFloat(document.getElementById('amount').value);
    const buyRate = parseFloat(document.getElementById('buyRateInput').value);
    const payoutRate = parseFloat(document.getElementById('payoutRateInput').value);
    const rows = document.querySelectorAll('.fund-row');
    
    // 計算保費級距與手續費
    let feeRate = 0; let tierText = "";
    if (amount < 2000000) { feeRate = 0.05; tierText = "200 萬以內"; }
    else if (amount < 5000000) { feeRate = 0.04; tierText = "200-500 萬"; }
    else if (amount < 10000000) { feeRate = 0.03; tierText = "500-1000 萬"; }
    else { feeRate = 0.02; tierText = "1000 萬以上"; }
    
    const totalPremium = amount * feeRate;
    const netTwd = amount - totalPremium;
    document.getElementById('tier').innerText = tierText;
    document.getElementById('feeRate').innerText = (feeRate*100) + "%";
    document.getElementById('totalPremium').innerText = "NT$ " + Math.round(totalPremium).toLocaleString();
    document.getElementById('totalNetTwd').innerText = "NT$ " + Math.round(netTwd).toLocaleString();
    document.getElementById('totalNetUsd').innerText = "$ " + (netTwd/buyRate).toLocaleString(undefined, {maximumFractionDigits: 2});

    // 計算配息
    let totalPct = 0;
    let totalPayout = 0;
    rows.forEach(r => {
        const pct = parseFloat(r.querySelector('.pct-input').value) || 0;
        const nav = parseFloat(r.querySelector('.nav-input').value) || 0;
        const div = parseFloat(r.querySelector('.div-input').value) || 0;
        totalPct += pct;
        if(pct > 0 && nav > 0) {
            const payout = (netTwd * (pct/100) / nav / buyRate) * div * payoutRate;
            r.querySelector('.fund-twd-payout').innerText = "投入金額：NT$ " + Math.round(netTwd * (pct/100)).toLocaleString();
            r.querySelector('.fund-footer').innerText = "預估月配息：NT$ " + Math.round(payout).toLocaleString();
            totalPayout += payout;
        }
    });
    document.getElementById('currentTotalPct').innerText = totalPct;
    document.getElementById('pctWarning').style.display = (totalPct !== 100) ? 'block' : 'none';
    document.getElementById('totalTwdPayout').innerText = "NT$ " + Math.round(totalPayout).toLocaleString() + " 元";
}
window.addEventListener("load", fetchFubonOfficialData);
</script>
</body>
</html>
